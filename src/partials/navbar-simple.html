<!-- PKC: the BentoPDF "container mx-auto px-4" logo bar is replaced on every
     tool subpage with the shared PKC top-pill nav (same as the homepage),
     mounted same-origin from the main pkc-in site at /assets/shared/top-pills.*.
     Wrapped in .pkc-nav-shell (defined in styles.css) so the pill is centered
     to the homepage width instead of bleeding full-width. -->
<div class="pkc-nav-shell" data-simple-nav="true">
  <div id="topPillsMount"></div>
</div>
<script>
  (function () {
    if (window.__pkcTopPillsLoaded) return;
    window.__pkcTopPillsLoaded = true;
    var css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = '/assets/shared/top-pills.css';
    document.head.appendChild(css);
    var js = document.createElement('script');
    js.src = '/assets/shared/top-pills.js';
    document.body.appendChild(js);
  })();
</script>
